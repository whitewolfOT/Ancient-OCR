profiles:
  default:
    description: "Fallback — printed Arabic, clean scan"
    binarizer: "otsu"
    seg_model: "10.5281/zenodo.14295555"
    rec_model: "agapet"
    rec_model_secondary: null
    n_best: 3
    rtl: true
    device: "cpu"
    preprocessing:
      brightness: 0
      contrast: 1.0
      gamma: 1.0
      saturation: 1.0
      stroke_normalization:
        enabled: false
        target_width: 2
      denoise_strength: 0
      sharpen: 0.0

  andalusian_naskh:
