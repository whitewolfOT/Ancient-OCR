      stroke_normalization:
        enabled: false
        target_width: 2
      denoise_strength: 5
      sharpen: 0.0

  maghrebi_degraded:
    description: "Maghrebi script — bleed-through, curved lines"
    binarizer: "sauvola"
    seg_model: "10.5281/zenodo.14295555"
    rec_model: "muharaf"
    rec_model_secondary: "agapet"
    n_best: 5
    rtl: true
    device: "cpu"
